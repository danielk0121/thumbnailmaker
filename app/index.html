<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>썸네일 생성기</title>
    <!-- SEO 및 Open Graph 태그 (카카오톡, 텔레그램) -->
    <meta name="description" content="순수 HTML, CSS, JS만 사용하여 빠르고 가볍게 만드는 썸네일 생성기">
    <meta property="og:type" content="website">
    <meta property="og:title" content="썸네일 생성기 - Thumbnail Maker">
    <meta property="og:description" content="클릭 한 번으로 고품질 텍스트 썸네일을 제작하고 다운로드하세요.">
    <meta property="og:image" content="https://danielk0121.github.io/thumbnailmaker/app/assets/og-image.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:url" content="https://danielk0121.github.io/thumbnailmaker/app/">
    <meta property="og:site_name" content="썸네일 생성기">
    <!-- Twitter Card 태그 (트위터/X) -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="썸네일 생성기 - Thumbnail Maker">
    <meta name="twitter:description" content="클릭 한 번으로 고품질 텍스트 썸네일을 제작하고 다운로드하세요.">
    <meta name="twitter:image" content="https://danielk0121.github.io/thumbnailmaker/app/assets/og-image.png">
    
    <!-- 파비콘 설정 (assets 이미지 활용) -->
    <link rel="icon" type="image/png" href="assets/og-image.png">
    
    <link rel="stylesheet" href="style.css?v=260409-0607">
</head>
<body>
    <div class="container">
        <header>
            <h1>썸네일 생성기</h1>
        </header>

        <main>
            <!-- 미리보기 영역 -->
            <section class="preview-section">
                <div id="canvas-container">
                    <svg id="thumbnail-svg" xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
                        <defs>
                            <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#7dd3fc;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#c4b5fd;stop-opacity:1" />
                            </linearGradient>
                        </defs>
                        <rect id="bg-rect" width="100%" height="100%" fill="url(#bg-gradient)" rx="0" ry="0" />
                        <text id="preview-text" x="50%" y="50%" text-anchor="middle" dominant-baseline="central" fill="#ffffff" font-family="sans-serif" font-weight="bold" font-size="70">
                            여기에 제목을 입력하세요
                        </text>
                    </svg>
                </div>
            </section>

            <!-- 컨트롤 패널 영역 -->
            <aside class="controls">
                <!-- 텍스트 + 디자인 2열 -->
                <div class="control-group">
                    <div class="top-grid">
                        <div class="top-grid-col">
                            <h3>텍스트 설정</h3>
                            <label for="text-input">내용</label>
                            <textarea id="text-input" placeholder="썸네일 제목 입력" rows="4"></textarea>
                        </div>
                        <div class="top-grid-col">
                            <h3>디자인 설정</h3>
                            <label>배경 모드</label>
                            <div class="btn-group" id="bg-mode-group">
                                <button type="button" data-value="solid">단색</button>
                                <button type="button" data-value="gradient" class="active">그라데이션</button>
                            </div>

                            <div id="color-controls">
                                <label for="bg-color">배경색 1</label>
                                <div class="flex-row">
                                    <input type="color" id="bg-color" value="#7dd3fc">
                                    <button id="btn-random-color">랜덤 색상</button>
                                </div>

                                <div id="gradient-color-2">
                                    <label for="bg-color-2">배경색 2</label>
                                    <div class="flex-row">
                                        <input type="color" id="bg-color-2" value="#c4b5fd">
                                        <button id="btn-random-color-2">랜덤 색상</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 글자 크기 + 모서리 스타일 한 줄 -->
                <div class="control-group">
                    <div class="inline-controls">
                        <div class="inline-control-item">
                            <label for="font-size">글자 크기 (px)</label>
                            <div class="flex-row font-size-control">
                                <input type="number" id="font-size" min="10" max="500" value="70">
                                <div class="btn-group-sm">
                                    <button id="btn-font-minus">-</button>
                                    <button id="btn-font-plus">+</button>
                                </div>
                            </div>
                        </div>
                        <div class="inline-control-item">
                            <label>모서리 스타일</label>
                            <div class="btn-group" id="corner-style-group">
                                <button type="button" data-value="sharp">각지게</button>
                                <button type="button" data-value="round" class="active">둥글게</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 해상도 설정 -->
                <div class="control-group resolution-group">
                    <div class="flex-row res-input-group">
                        <span class="res-label">해상도</span>
                        <input type="number" id="width-input" value="400" placeholder="가로">
                        <input type="number" id="height-input" value="400" placeholder="세로">
                        <button id="btn-apply-res" class="btn-primary">적용</button>
                    </div>
                </div>

                <!-- 내보내기 -->
                <div class="control-group export-group">
                    <h3>저장하기</h3>
                    <div class="export-buttons">
                        <button id="btn-export-png">PNG 저장</button>
                        <button id="btn-export-jpg">JPG 저장</button>
                        <button id="btn-export-svg">SVG 저장</button>
                        <button id="btn-copy-clipboard">클립보드 복사</button>
                    </div>
                </div>
            </aside>
        </main>
    </div>

    <script src="main.js?v=260409-0607"></script>

    <footer>
        <p>ver-260409-0607</p>
        <p><a href="https://github.com/danielk0121" target="_blank">github.com/danielk0121</a></p>
    </footer>
</body>
</html>
