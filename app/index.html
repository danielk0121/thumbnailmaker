<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thumbnail Maker - 썸네일 메이커</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🖼️ Thumbnail Maker</h1>
        </header>

        <main>
            <!-- 미리보기 영역 -->
            <section class="preview-section">
                <div id="canvas-container">
                    <svg id="thumbnail-svg" xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
                        <defs>
                            <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
                            </linearGradient>
                        </defs>
                        <rect id="bg-rect" width="100%" height="100%" fill="url(#bg-gradient)" rx="0" ry="0" />
                        <text id="preview-text" x="50%" y="50%" text-anchor="middle" dominant-baseline="central" fill="#ffffff" font-family="sans-serif" font-weight="bold" font-size="80">
                            여기에 제목을 입력하세요
                        </text>
                    </svg>
                </div>
            </section>

            <!-- 컨트롤 패널 영역 -->
            <aside class="controls">
                <!-- 텍스트 설정 -->
                <div class="control-group">
                    <h3>✍️ 텍스트 설정</h3>
                    <label for="text-input">내용</label>
                    <input type="text" id="text-input" placeholder="썸네일 제목 입력" value="여기에 제목을 입력하세요">
                    
                    <label for="font-size">글자 크기 (px)</label>
                    <input type="number" id="font-size" min="10" max="500" value="80">
                </div>

                <!-- 배경 및 디자인 설정 -->
                <div class="control-group">
                    <h3>🎨 디자인 설정</h3>
                    
                    <label for="bg-mode">배경 모드</label>
                    <select id="bg-mode">
                        <option value="solid">단색 (Solid)</option>
                        <option value="gradient" selected>그라데이션 (Gradient)</option>
                    </select>

                    <div id="color-controls">
                        <label for="bg-color">배경색 1</label>
                        <div class="flex-row">
                            <input type="color" id="bg-color" value="#6366f1">
                            <button id="btn-random-color">랜덤 색상</button>
                        </div>

                        <div id="gradient-color-2">
                            <label for="bg-color-2">배경색 2 (그라데이션 전용)</label>
                            <input type="color" id="bg-color-2" value="#a855f7">
                        </div>
                    </div>

                    <label for="border-radius">모서리 둥글기 (<span id="border-radius-val">0</span>px)</label>
                    <input type="range" id="border-radius" min="0" max="200" value="0">
                </div>

                <!-- 해상도 설정 -->
                <div class="control-group">
                    <h3>📐 해상도</h3>
                    <div class="flex-row">
                        <div class="input-unit">
                            <label for="width-input">가로</label>
                            <input type="number" id="width-input" value="1280">
                        </div>
                        <div class="input-unit">
                            <label for="height-input">세로</label>
                            <input type="number" id="height-input" value="720">
                        </div>
                    </div>
                </div>

                <!-- 내보내기 -->
                <div class="control-group export-group">
                    <h3>💾 저장하기</h3>
                    <div class="export-buttons">
                        <button id="btn-export-png" class="btn-primary">PNG 저장</button>
                        <button id="btn-export-jpg">JPG 저장</button>
                        <button id="btn-export-svg">SVG 저장</button>
                    </div>
                </div>
            </aside>
        </main>
    </div>

    <script src="main.js"></script>
</body>
</html>
