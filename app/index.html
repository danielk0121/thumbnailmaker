<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>썸네일 생성기</title>
    <!-- SEO 및 Open Graph 태그 -->
    <meta name="description" content="순수 HTML, CSS, JS만 사용하여 빠르고 가볍게 만드는 썸네일 생성기">
    <meta property="og:type" content="website">
    <meta property="og:title" content="썸네일 생성기 - Thumbnail Maker">
    <meta property="og:description" content="클릭 한 번으로 고품질 텍스트 썸네일을 제작하고 다운로드하세요.">
    <meta property="og:image" content="assets/og-image.png">
    <meta property="og:url" content="https://danielk0121.github.io/thumbnailmaker/app/">
    
    <!-- 파비콘 설정 (assets 이미지 활용) -->
    <link rel="icon" type="image/png" href="assets/og-image.png">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>썸네일 생성기</h1>
        </header>

        <main>
            <!-- 미리보기 영역 -->
            <section class="preview-section">
                <div id="canvas-container">
                    <svg id="thumbnail-svg" xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
                        <defs>
                            <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
                            </linearGradient>
                        </defs>
                        <rect id="bg-rect" width="100%" height="100%" fill="url(#bg-gradient)" rx="0" ry="0" />
                        <text id="preview-text" x="50%" y="50%" text-anchor="middle" dominant-baseline="central" fill="#ffffff" font-family="sans-serif" font-weight="bold" font-size="80">
                            여기에 제목을 입력하세요
                        </text>
                    </svg>
                </div>
            </section>

            <!-- 컨트롤 패널 영역 -->
            <aside class="controls">
                <!-- 텍스트 설정 -->
                <div class="control-group">
                    <h3>텍스트 설정</h3>
                    <label for="text-input">내용</label>
                    <textarea id="text-input" placeholder="썸네일 제목 입력" rows="4"></textarea>

                    <label for="font-size">글자 크기 (px)</label>
                    <div class="flex-row font-size-control">
                        <input type="number" id="font-size" min="10" max="500" value="80">
                        <div class="btn-group-sm">
                            <button id="btn-font-minus">-</button>
                            <button id="btn-font-plus">+</button>
                        </div>
                    </div>
                </div>

                <!-- 배경 및 디자인 설정 -->
                <div class="control-group">
                    <h3>디자인 설정</h3>
                    
                    <label>배경 모드</label>
                    <div class="btn-group" id="bg-mode-group">
                        <button type="button" data-value="solid">단색</button>
                        <button type="button" data-value="gradient" class="active">그라데이션</button>
                    </div>

                    <div id="color-controls">
                        <label for="bg-color">배경색 1</label>
                        <div class="flex-row">
                            <input type="color" id="bg-color" value="#6366f1">
                            <button id="btn-random-color">랜덤 색상</button>
                        </div>

                        <div id="gradient-color-2">
                            <label for="bg-color-2">배경색 2 (그라데이션 전용)</label>
                            <div class="flex-row">
                                <input type="color" id="bg-color-2" value="#a855f7">
                                <button id="btn-random-color-2">랜덤 색상</button>
                            </div>
                        </div>
                    </div>

                    <label>모서리 스타일</label>
                    <div class="btn-group" id="corner-style-group">
                        <button type="button" data-value="sharp" class="active">각지게</button>
                        <button type="button" data-value="round">둥글게</button>
                    </div>

                    <div id="border-radius-group" style="display: none; margin-bottom: 1rem;">
                        <p style="font-size: 0.8rem; color: var(--text-secondary);">둥글기: 40px (고정)</p>
                    </div>
                </div>

                <!-- 해상도 설정 -->
                <div class="control-group">
                    <h3>해상도</h3>
                    <div class="flex-row res-input-group">
                        <div class="input-unit">
                            <label for="width-input">가로</label>
                            <input type="number" id="width-input" value="400">
                        </div>
                        <div class="input-unit">
                            <label for="height-input">세로</label>
                            <input type="number" id="height-input" value="400">
                        </div>
                        <button id="btn-apply-res" class="btn-primary">적용</button>
                    </div>
                </div>

                <!-- 내보내기 -->
                <div class="control-group export-group">
                    <h3>저장하기</h3>
                    <div class="export-buttons">
                        <button id="btn-export-png" class="btn-primary">PNG 저장</button>
                        <button id="btn-export-jpg">JPG 저장</button>
                        <button id="btn-export-svg">SVG 저장</button>
                    </div>
                </div>
            </aside>
        </main>
    </div>

    <script src="main.js"></script>
</body>
</html>
